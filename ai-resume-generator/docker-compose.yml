services:
  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: resume-python-backend
    ports:
      - "8000:8000"
    environment:
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-mistralai/mistral-7b-instruct-v0.3}
      - PYTHONUNBUFFERED=1
    volumes:
      - resume-output:/app/output
    restart: unless-stopped
    networks:
      - resume-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: resume-node-server
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PYTHON_BACKEND_URL=http://python-backend:8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      python-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - resume-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: resume-client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - resume-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

volumes:
  resume-output:

networks:
  resume-network:
    driver: bridge
