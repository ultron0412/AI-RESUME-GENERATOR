version: "3.8"

services:
  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    container_name: resume-python-backend
    ports:
      - "8000:8000"
    environment:
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234/v1/chat/completions}
      - LM_STUDIO_MODEL=${LM_STUDIO_MODEL:-mistralai/mistral-7b-instruct-v0.3}
      - PYTHONUNBUFFERED=1
    volumes:
      - resume-output:/app/output
    restart: on-failure
    networks:
      - resume-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: resume-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PYTHON_BACKEND_URL=http://python-backend:8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5000}
    depends_on:
      python-backend:
        condition: service_healthy
    restart: on-failure
    networks:
      - resume-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/resume"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  resume-output:
    driver: local

networks:
  resume-network:
    driver: bridge
